name: druginsight
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - rdkit
  - pip
  - pip:
      - streamlit
      - --extra-index-url https://download.pytorch.org/whl/cpu
      - torch==2.6.0+cpu
      - torch-geometric==2.7.0
      - numpy
      - pandas
      - scikit-learn
